# Phone-friendly tmux config for the `wf` (watcher-followup) session — Blink/mosh on iPhone.
# Goal: two-finger swipe scrolls back through the LIVE Claude conversation, no `less`.

set -g mouse on                # touch-drag in Blink scrolls (auto-enters copy-mode)
set -g history-limit 100000    # deep scrollback
set -g alternate-screen off    # keep the full-screen TUI's output in scrollback so it
                               # can be scrolled (without this, copy-mode only shows the
                               # current screen). If the display ever looks cluttered,
                               # flip this back to `on`.
set -g status off              # reclaim a row for the chat
set -g escape-time 0           # snappier TUI keys over mosh
setw -g mode-keys vi           # vi-style copy-mode navigation

# Scroll a wheel "tick" by 3 lines for a smoother feel.
bind -T copy-mode-vi WheelUpPane   send -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane send -X -N 3 scroll-down
# Tap once (left click) while scrolled back to jump to the bottom and resume typing.
bind -T copy-mode-vi MouseDown1Pane send -X cancel
